name: Run Amazon Deal Bot

on:
  schedule:
    - cron: '0 * * * *' # Triggers the bot automatically at the start of every single hour
  workflow_dispatch: # Allows you to also trigger the bot manually anytime

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Script
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          AMAZON_TAG: ${{ secrets.AMAZON_TAG }}
        run:          python -m amazon-deals-telegram-bot
